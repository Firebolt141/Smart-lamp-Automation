name: Build LampSmart Controller APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:        # manual trigger from the Actions tab

jobs:
  build:
    name: Assemble Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ─────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Java 17 (required for AGP 8.x) ─────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Make gradlew executable ────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x lampsmart-controller/gradlew

      # ── 4. Build Debug APK ────────────────────────────────────────────────
      - name: Build Debug APK
        working-directory: lampsmart-controller
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 5. Upload APK artifact ────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LampSmart-Controller-APK
          path: lampsmart-controller/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error
