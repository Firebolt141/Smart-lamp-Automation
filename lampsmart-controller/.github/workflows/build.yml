name: Build & Release APK

# Fires on every push to main and on manual dispatch.
# Produces a versioned APK, publishes it as a GitHub Release, and
# also uploads it as a workflow artifact — zero manual steps required.

on:
  push:
    branches: [main]
  workflow_dispatch:

# contents:write is needed to create tags and GitHub Releases.
permissions:
  contents: write

jobs:
  build-and-release:
    name: Build, version & release
    runs-on: ubuntu-latest

    steps:
      # ── 1. Full checkout (fetch-depth 0 for auto release-notes) ──────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Java 17 (required for AGP 8.x) ────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Derive version from run number + short SHA ─────────────────────
      #   versionCode = run number  (always incrementing integer)
      #   versionName = 1.0.<run>   (human-readable semver-style string)
      - name: Compute version
        id: ver
        run: |
          CODE="${{ github.run_number }}"
          NAME="1.0.${CODE}"
          SHA=$(git rev-parse --short HEAD)
          APK_NAME="LampSmart-v${NAME}.apk"
          echo "code=${CODE}"       >> "$GITHUB_OUTPUT"
          echo "name=${NAME}"       >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}"         >> "$GITHUB_OUTPUT"
          echo "tag=v${NAME}"       >> "$GITHUB_OUTPUT"
          echo "apk_name=${APK_NAME}" >> "$GITHUB_OUTPUT"

      # ── 4. Build ──────────────────────────────────────────────────────────
      - name: Grant gradlew execute permission
        run: chmod +x lampsmart-controller/gradlew

      - name: Build Debug APK
        working-directory: lampsmart-controller
        run: |
          ./gradlew assembleDebug \
            -PversionCode="${{ steps.ver.outputs.code }}" \
            -PversionName="${{ steps.ver.outputs.name }}" \
            --no-daemon --stacktrace

      # ── 5. Rename APK with version ────────────────────────────────────────
      - name: Rename APK
        id: apk
        run: |
          SRC="lampsmart-controller/app/build/outputs/apk/debug/app-debug.apk"
          DST="lampsmart-controller/app/build/outputs/apk/debug/${{ steps.ver.outputs.apk_name }}"
          mv "$SRC" "$DST"
          echo "path=${DST}" >> "$GITHUB_OUTPUT"

      # ── 6. Upload as workflow artifact (Actions tab) ──────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.ver.outputs.apk_name }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 90
          if-no-files-found: error

      # ── 7. Create versioned GitHub Release with APK attached ──────────────
      #   generate_release_notes: true → GitHub auto-writes changelog from commits
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.apk.outputs.path }}
          body: |
            ## LampSmart Pro BLE Controller — ${{ steps.ver.outputs.tag }}

            Built automatically from commit `${{ steps.ver.outputs.sha }}` on `main`.

            ### 📲 Install
            1. Download **`${{ steps.ver.outputs.apk_name }}`** from Assets below.
            2. On your Android phone: **Settings → Apps → Special app access → Install unknown apps** → enable.
            3. Open and install the APK, launch the app, grant all Bluetooth permissions.

            ### 💡 Quick start
            - Tap **Turn ON / Turn OFF** in the app to send BLE broadcast commands.
            - Long-press the app icon for **home-screen shortcuts** (no voice needed).
            - Create a **Google Assistant Routine** → "When I say 'lamp on'" → open shortcut.

            See the [README](../../blob/main/lampsmart-controller/README.md) for the full protocol notes and ESP32 bridge fallback.
